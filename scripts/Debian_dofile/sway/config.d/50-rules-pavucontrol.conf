# ============================================================================
# 50-rules-pavucontrol.conf — 音频控制面板窗口规则
# 移植自 Fedora Sway Spin 的 /usr/share/sway/config.d/50-rules-pavucontrol.conf
# ============================================================================
# 功能:
#   使 PulseAudio 音量控制面板 (GTK 版和 Qt 版) 以浮动窗口显示,
#   并在屏幕中央打开, 而非平铺占用整个工作区。
# ============================================================================

# GTK 版 pavucontrol
for_window [app_id="pavucontrol"] {
    floating enable
    move position center
}

# Qt 版 pavucontrol-qt
for_window [app_id="pavucontrol-qt"] {
    floating enable
    move position center
}
