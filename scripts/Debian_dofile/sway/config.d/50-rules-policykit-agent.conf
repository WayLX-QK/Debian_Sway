# ============================================================================
# 50-rules-policykit-agent.conf — Polkit 认证代理窗口规则
# 移植自 Fedora Sway Spin 的 /usr/share/sway/config.d/50-rules-policykit-agent.conf
# ============================================================================
# 功能:
#   使 lxqt-policykit-agent (Polkit 图形认证代理) 的授权窗口
#   以浮动模式显示在屏幕中央, 而不是平铺占用整个工作区。
# ============================================================================

for_window [app_id="lxpolkit"] {
    floating enable
    move position center
}
