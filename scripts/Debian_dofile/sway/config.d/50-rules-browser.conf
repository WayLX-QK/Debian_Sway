# ============================================================================
# 50-rules-browser.conf — 浏览器窗口规则
# 移植自 Fedora Sway Spin 的 /usr/share/sway/config.d/50-rules-browser.conf
# ============================================================================
# 功能:
#   1. 为常见浏览器窗口打上 "Browser" 标记
#   2. 全屏浏览时禁止屏幕保护 (inhibit_idle fullscreen)
#   3. Firefox Wayland 屏幕共享指示器窗口浮动
# ============================================================================

# 为常见浏览器窗口打标记 (支持 XWayland class 和 Wayland app_id)
for_window [class="Chromium-browser"] mark Browser
for_window [class="Brave-browser"] mark Browser
for_window [class="firefox"]  mark Browser
for_window [app_id="Chromium-browser"] mark Browser
for_window [app_id="brave-browser"] mark Browser
for_window [app_id="firefox"] mark Browser

# 全屏浏览时禁止屏幕保护/休眠
for_window [con_mark="Browser"] {
    inhibit_idle fullscreen
}

# Firefox Wayland 屏幕共享指示器窗口浮动显示
for_window [app_id="firefox" title="Firefox — Sharing Indicator"] {
    floating enable
}
