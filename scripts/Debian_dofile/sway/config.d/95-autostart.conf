# ============================================================================
# 95-autostart-policykit-agent.conf — PolicyKit 认证代理自动启动
# 移植自 Fedora Sway Spin 的 /usr/share/sway/config.d/95-autostart-policykit-agent.conf
# ============================================================================
# 功能:
#   自动启动 lxpolicykitagent, 提供图形化的权限提升对话框。
#   当应用需要 root 权限时 (如 GParted, virt-manager, pkexec),
#   此代理会弹出授权对话框让用户输入密码。
# ============================================================================
# 依赖: lxpolkit
# ============================================================================

exec_always sh -c 'pkill -x swaync; swaync &'
exec_always sh -c 'pkill -x nm-applet; nm-applet &'
exec_always sh -c 'pkill -x lxpolkit; lxpolkit &'

# exec /usr/bin/xdg-user-dirs-update 
